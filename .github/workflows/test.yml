name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Setup test database
        working-directory: backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Seed database
        working-directory: backend
        run: node src/utils/seed.js
        env:
          DATABASE_URL: "file:./prisma/dev.db"
          JWT_SECRET: "test-secret-for-ci-pipeline-only"

      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: "test-secret-for-ci-pipeline-only"
          DATABASE_URL: "file:./prisma/dev.db"

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for console.log in controllers
        run: |
          # Warn about console.log usage (not fail)
          grep -rn "console\.log" backend/src/controllers/ || echo "No console.log found in controllers"

      - name: Check for hardcoded secrets
        run: |
          # Fail if production secrets are committed
          if grep -rn "CHANGE_ME\|your_secret_here" backend/.env 2>/dev/null; then
            echo "Warning: Default secrets found in .env"
          fi
          # Make sure .env is in .gitignore
          if grep -q "^\.env$" .gitignore 2>/dev/null || grep -q "^\.env$" backend/.gitignore 2>/dev/null; then
            echo ".env is properly gitignored"
          else
            echo "Warning: .env may not be gitignored"
          fi
