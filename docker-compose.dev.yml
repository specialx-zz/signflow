version: '3.8'

# 개발용 Docker Compose (docker-compose -f docker-compose.dev.yml up)
services:
  # ─── MySQL Database ────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: signflow-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: signflow
      MYSQL_USER: signflow
      MYSQL_PASSWORD: signflow
      TZ: Asia/Seoul
    ports:
      - "3307:3306"   # 로컬 MySQL(3306)과 충돌 방지
    volumes:
      - signflow-mysql-dev-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "signflow", "--password=signflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: signflow-backend-dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=mysql://signflow:signflow@mysql:3306/signflow
      - JWT_SECRET=signflow-dev-secret-key
      - JWT_EXPIRES_IN=7d
      - SERVER_URL=http://localhost:3001
      - LOG_LEVEL=debug
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    command: npx nodemon src/app.js

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: signflow-frontend-dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host 0.0.0.0

  player:
    build:
      context: ./player
      dockerfile: Dockerfile.dev
    container_name: signflow-player-dev
    ports:
      - "5174:5174"
    volumes:
      - ./player/src:/app/src
    command: npm run dev -- --host 0.0.0.0

volumes:
  signflow-mysql-dev-data:
