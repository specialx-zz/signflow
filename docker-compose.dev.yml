version: '3.8'

# 개발용 Docker Compose (docker-compose -f docker-compose.dev.yml up)
services:
  # ─── MySQL Database ────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: vuesign-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vuesign
      MYSQL_USER: vuesign
      MYSQL_PASSWORD: vuesign
      TZ: Asia/Seoul
    ports:
      - "3307:3306"   # 로컬 MySQL(3306)과 충돌 방지
    volumes:
      - vuesign-mysql-dev-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "vuesign", "--password=vuesign"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: vuesign-backend-dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=mysql://vuesign:vuesign@mysql:3306/vuesign
      - JWT_SECRET=vuesign-dev-secret-key
      - JWT_EXPIRES_IN=7d
      - SERVER_URL=http://localhost:3001
      - LOG_LEVEL=debug
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx nodemon src/app.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: vuesign-frontend-dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host 0.0.0.0

  player:
    build:
      context: ./player
      dockerfile: Dockerfile.dev
    container_name: vuesign-player-dev
    ports:
      - "5174:5174"
    volumes:
      - ./player/src:/app/src
    command: npm run dev -- --host 0.0.0.0

volumes:
  vuesign-mysql-dev-data:
