services:
  # 1. 통합 데이터베이스 (MySQL 8.0)
  settle-db:
    image: mysql:8.0
    container_name: settle-db
    restart: always
    environment:
      TZ: Asia/Seoul
      MYSQL_ROOT_PASSWORD: "dkagh12!@"
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 4G

  # 2. 리액트 + Nginx (웹 서버 및 프록시)
  react-web:
    image: nginx:stable-alpine
    container_name: react-web
    restart: always
    environment:
      TZ: Asia/Seoul
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./react-client/dist:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # ── VueSign 추가 ──────────────────────────────────────
      - ./vuesign/frontend-dist:/usr/share/nginx/vuesign-admin:ro
      - ./vuesign/player-dist:/usr/share/nginx/vuesign-player:ro
      - ./nginx/vuesign.conf:/etc/nginx/conf.d/vuesign.conf:ro
    depends_on:
      - settle-db
      - vuesign-backend
    deploy:
      resources:
        limits:
          memory: 512M

  # ── VueSign Backend (Node.js + SQLite) ──────────────────────
  vuesign-backend:
    build:
      context: ./vuesign/backend
      dockerfile: Dockerfile
    container_name: vuesign-backend
    restart: always
    environment:
      TZ: Asia/Seoul
      NODE_ENV: production
      PORT: 3001
      # SQLite DB 위치 (볼륨에 영구 저장)
      DATABASE_URL: "file:/app/data/vuesign.db"
      # ⚠️  아래 값 반드시 변경하세요 (32자 이상 랜덤 문자열)
      JWT_SECRET: "change-this-secret-to-random-32chars!!"
      # 프론트엔드 도메인 (CORS 허용)
      FRONTEND_URL: "https://vuesign.yourdomain.com"
    volumes:
      - ./vuesign/data:/app/data        # SQLite DB 영구 저장
      - ./vuesign/uploads:/app/uploads  # 업로드 파일 영구 저장
    # 외부에 포트 노출 안 함 (Nginx 가 내부 프록시)
    expose:
      - "3001"
    deploy:
      resources:
        limits:
          memory: 512M

  # 3. 업체 1 서버 (shop1) - 공통 설정(Anchor) 기준점
  api-partner-1:
    image: eclipse-temurin:17-jre-alpine
    container_name: api-partner-1
    restart: always
    volumes:
      - ./app.jar:/app/app.jar
      - ./logs/api-partner-1:/app/logs
    working_dir: /app
    environment: &env_base
      # --- 기본 및 DB 설정 ---
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: prod-special
      DB_HOST: settle-db
      DB_NAME: shop1
      DB_USER: root
      DB_PASS: "dkagh12!@"
      # --- 텔레그램 설정 (업체별로 다르게 수정 가능) ---
      TELEGRAM_TOKEN: "8683224155:AAHzxjDsZcVMIbDpvCfqS2JZo34pO51ajnI"
      TELEGRAM_ADMIN_ID: "-5256149446"
      TELEGRAM_REMIT_ID: "-5256149446"
      TELEGRAM_DEV_ID: "-5235194066"
      # --- 결제 API 설정 (업체별로 다르게 수정 가능) ---
      PAYMENT_KOR_MOCK: "false"
      PAYMENT_KOR_PAY_KEY: "pk_948a-120d87-333-f4066"
      PAYMENT_KOR_VACT_KEY: "pk_52fa-ff313e-074-4d0e4"
      PAYMENT_BASE_URL: "https://api.kp-pay.com/api"
    deploy:
      resources:
        limits:
          memory: 1.5G
    command: java -jar app.jar

  # 4. 업체 2 서버 (shop2)
  api-partner-2:
    image: eclipse-temurin:17-jre-alpine
    container_name: api-partner-2
    restart: always
    volumes:
      - ./app.jar:/app/app.jar
      - ./logs/api-partner-2:/app/logs
    working_dir: /app
    environment:
      <<: *env_base
      DB_NAME: shop2
      # --- 텔레그램 설정 (업체별로 다르게 수정 가능) ---
