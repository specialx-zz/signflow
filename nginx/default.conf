# 접속 도메인별 백엔드 컨테이너 매핑
map $http_host $backend {
    hostnames;
    admin1.rese.co.kr  http://api-partner-1:8080;
    regit1.rese.co.kr  http://api-partner-1:8080;
    admin2.rese.co.kr  http://api-partner-2:8080;
    regit2.rese.co.kr  http://api-partner-2:8080;
}

# ──────────────────────────────────────────────────────────────
#  VueSign 관리자  https://vuesign.rese.co.kr
#  *.rese.co.kr 와일드카드 인증서 재사용
# ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name vuesign.rese.co.kr;

    ssl_certificate     /etc/letsencrypt/live/admin1.rese.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin1.rese.co.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    resolver 127.0.0.11 valid=30s;

    # 빌드된 React 관리자 앱 정적 파일
    root  /usr/share/nginx/vuesign-admin;
    index index.html;

    # REST API → 백엔드 컨테이너 프록시
    location /api/ {
        proxy_pass         http://vuesign-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 100M;
    }

    # Socket.IO WebSocket 프록시
    location /socket.io/ {
        proxy_pass         http://vuesign-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # 업로드 파일 프록시 (player.rese.co.kr 등 크로스 오리진 접근 허용)
    location /uploads/ {
        proxy_pass       http://vuesign-backend:3001;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public" always;
        # 플레이어가 crossOrigin="anonymous"로 미디어를 로드해 canvas에 그릴 수 있도록 CORS 허용
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
    }

    # React SPA — 새로고침 시 404 방지
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ──────────────────────────────────────────────────────────────
#  VueSign 플레이어  https://player.rese.co.kr
# ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name player.rese.co.kr;

    ssl_certificate     /etc/letsencrypt/live/admin1.rese.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin1.rese.co.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 빌드된 플레이어 앱 정적 파일
    root  /usr/share/nginx/vuesign-player;
    index index.html;

    # 플레이어 SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    # JS/CSS 장기 캐시 (파일명에 해시 포함)
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# [1] HTTP(80) 설정: 모든 요청을 HTTPS로 던집니다.
server {
    listen 80;
    server_name *.rese.co.kr;

    # Certbot 인증 경로는 리다이렉트에서 제외 (갱신을 위해 남겨둠)
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    # 그 외 모든 접속은 HTTPS로 301 강제 이동
    location / {
        return 301 https://$host$request_uri;
    }
}

# [2] HTTPS(443) 설정: 실제 서비스가 돌아가는 곳
server {
    listen 443 ssl;
    server_name *.rese.co.kr;

    # 발급받은 인증서 파일 경로
    ssl_certificate /etc/letsencrypt/live/admin1.rese.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin1.rese.co.kr/privkey.pem;

    # 보안 최적화 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    resolver 127.0.0.11 valid=30s;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}