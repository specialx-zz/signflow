# SignFlow 단독 배포용 Nginx 설정
# signflow-docker-compose.yml에서 사용

upstream signflow_api {
    server signflow-backend:3001;
}

server {
    listen 80 default_server;
    server_name _;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # GZIP
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Admin Dashboard (기본)
    root /usr/share/nginx/signflow-admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Player (하위 경로)
    location /player/ {
        alias /usr/share/nginx/signflow-player/;
        try_files $uri $uri/ /player/index.html;
    }

    # API 프록시
    location /api/ {
        proxy_pass http://signflow_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # WebSocket
    location /socket.io/ {
        proxy_pass http://signflow_api/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # 업로드 파일
    location /uploads/ {
        proxy_pass http://signflow_api/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 정적 자산
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
