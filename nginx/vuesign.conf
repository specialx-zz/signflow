# ============================================================
#  VueSign - DID 관리 시스템 Nginx 설정
#  도메인: vuesign.yourdomain.com  /  player.yourdomain.com
#  yourdomain.com 을 실제 도메인으로 모두 교체하세요
# ============================================================

# ── HTTP → HTTPS 리다이렉트 (관리자) ──────────────────────────
server {
    listen 80;
    server_name vuesign.yourdomain.com;

    # Let's Encrypt 인증용 경로 (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 관리자 패널 ──────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name vuesign.yourdomain.com;

    # SSL 인증서 (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/vuesign.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vuesign.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 정적 파일 루트 (빌드된 React 관리자 앱)
    root  /usr/share/nginx/vuesign-admin;
    index index.html;

    # ── REST API 프록시 ────────────────────────────────────────
    location /api/ {
        proxy_pass         http://vuesign-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 100M;
    }

    # ── Socket.IO 프록시 (WebSocket) ─────────────────────────
    location /socket.io/ {
        proxy_pass         http://vuesign-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;  # WebSocket 장시간 연결 유지
    }

    # ── 업로드 파일 프록시 ────────────────────────────────────
    location /uploads/ {
        proxy_pass       http://vuesign-backend:3001;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── React SPA 라우팅 (새로고침 시 404 방지) ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

# ── HTTP → HTTPS 리다이렉트 (플레이어) ───────────────────────
server {
    listen 80;
    server_name player.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 플레이어 ─────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name player.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/player.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/player.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 빌드된 플레이어 앱
    root  /usr/share/nginx/vuesign-player;
    index index.html;

    # 플레이어 SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 캐시 설정 (JS/CSS 는 해시 포함이라 장기 캐시 가능)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
