version: '3.8'

# VueSign 단독 배포용 Docker Compose
# 사용법: docker-compose -f vuesign-docker-compose.yml up -d

services:
  # ─── MySQL Database ────────────────────────────────
  vuesign-mysql:
    image: mysql:8.0
    container_name: vuesign-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-changeme-root-password}"
      MYSQL_DATABASE: vuesign
      MYSQL_USER: vuesign
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-changeme-vuesign-password}"
      TZ: Asia/Seoul
    volumes:
      - vuesign-mysql-data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "vuesign", "--password=${MYSQL_PASSWORD:-changeme-vuesign-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vuesign-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Backend API ──────────────────────────────────
  vuesign-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vuesign-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: "mysql://vuesign:${MYSQL_PASSWORD:-changeme-vuesign-password}@vuesign-mysql:3306/vuesign"
      JWT_SECRET: "${JWT_SECRET:-change-this-secret-to-random-32chars!!}"
      JWT_EXPIRES_IN: "7d"
      SERVER_URL: "${SERVER_URL:-http://localhost}"
      LOG_LEVEL: info
      # R2 Storage (optional)
      R2_ACCOUNT_ID: "${R2_ACCOUNT_ID:-}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID:-}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY:-}"
      R2_BUCKET: "${R2_BUCKET:-}"
      R2_PUBLIC_URL: "${R2_PUBLIC_URL:-}"
    volumes:
      - vuesign-uploads:/app/uploads
    expose:
      - "3001"
    depends_on:
      vuesign-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - vuesign-net

  # ─── Nginx (Frontend + Player + Reverse Proxy) ───
  vuesign-nginx:
    image: nginx:1.25-alpine
    container_name: vuesign-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/vuesign-standalone.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - vuesign-frontend-dist:/usr/share/nginx/vuesign-admin:ro
      - vuesign-player-dist:/usr/share/nginx/vuesign-player:ro
    depends_on:
      - vuesign-backend
    networks:
      - vuesign-net

  # ─── Frontend Builder (build-only) ────────────────
  vuesign-frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api"
    container_name: vuesign-frontend-build
    volumes:
      - vuesign-frontend-dist:/app/dist
    command: ["sh", "-c", "cp -r /app/dist/* /app/dist/"]
    profiles:
      - build

  # ─── Player Builder (build-only) ──────────────────
  vuesign-player-build:
    build:
      context: ./player
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api"
    container_name: vuesign-player-build
    volumes:
      - vuesign-player-dist:/app/dist
    command: ["sh", "-c", "cp -r /app/dist/* /app/dist/"]
    profiles:
      - build

  # ─── Auto Backup ──────────────────────────────────
  vuesign-backup:
    image: mysql:8.0
    container_name: vuesign-backup
    restart: unless-stopped
    environment:
      MYSQL_HOST: vuesign-mysql
      MYSQL_USER: vuesign
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-changeme-vuesign-password}"
      MYSQL_DATABASE: vuesign
    volumes:
      - vuesign-backups:/backups
      - ./scripts/backup.sh:/etc/periodic/daily/backup:ro
    entrypoint: /bin/sh
    command: ["-c", "chmod +x /etc/periodic/daily/backup && crond -f -l 2"]
    depends_on:
      vuesign-mysql:
        condition: service_healthy
    networks:
      - vuesign-net

volumes:
  vuesign-mysql-data:
  vuesign-uploads:
  vuesign-frontend-dist:
  vuesign-player-dist:
  vuesign-backups:

networks:
  vuesign-net:
    driver: bridge
